<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="地域旅行Ver3">
<meta name="theme-color" content="#0f5132">
<link rel="manifest" href="manifest.webmanifest">
<title>地域限定旅行業務取扱管理者 Ver3</title>
<style>
:root{--g:#0f5132;--bg:#f4f7f5;--line:#dbe5de;--ok:#147a3d;--ng:#b42318;--blue:#175cd3}
*{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:#17201b}
header{position:sticky;top:0;background:var(--g);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;z-index:10}
header h1{font-size:20px;margin:0}header small{opacity:.9}
main{max-width:760px;margin:auto;padding:12px 12px calc(110px + env(safe-area-inset-bottom))}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px #0000000b}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#eef8f2;border-radius:12px;padding:12px;text-align:center}.stat b{display:block;font-size:24px;color:var(--g)}.stat span{font-size:12px}
.qhead{display:flex;justify-content:space-between;align-items:center;gap:15px}.qhead h2{margin:0;font-size:24px}.tag{font-size:13px;background:#eaf1ff;color:var(--blue);padding:6px 10px;border-radius:999px}
.question{font-size:23px;line-height:1.75;font-weight:800;margin:22px 0}
.choices{display:grid;gap:12px}.choice{display:flex;gap:14px;text-align:left;padding:17px;border:2px solid #cfdad3;background:#fff;border-radius:13px;cursor:pointer;font-size:18px;line-height:1.55;min-height:64px;-webkit-tap-highlight-color:transparent}.choice strong{font-size:20px}.choice.sel{border-color:var(--blue);background:#eef4ff}.choice.correct{border-color:var(--ok);background:#eaf8ef}.choice.wrong{border-color:var(--ng);background:#fff0ef}
.actions{display:flex;gap:10px;margin-top:22px;position:sticky;bottom:calc(8px + env(safe-area-inset-bottom));z-index:6;background:#fff;padding:8px 0}.actions button,.nav button,.understanding button{border:0;border-radius:12px;padding:15px 16px;font-weight:800;cursor:pointer;min-height:52px}.primary{background:var(--g);color:#fff}.secondary{background:#e8eee9}
.result{display:none}.result.show{display:block}.answerbox{font-size:22px;font-weight:900;padding:16px;border-radius:12px;margin-bottom:15px}.answerbox.ok{background:#eaf8ef;color:var(--ok)}.answerbox.ng{background:#fff0ef;color:var(--ng)}
.explanation{font-size:18px;line-height:1.9}.memory{background:#fff8db;border-left:5px solid #d8a400;padding:14px 16px;border-radius:8px;margin-top:18px}
.understanding{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}.understanding button{background:#edf2ef}.understanding button.active{background:var(--g);color:#fff}
.nav{display:flex;justify-content:space-between;align-items:center;gap:10px}.progress{height:10px;background:#e4eae6;border-radius:99px;overflow:hidden;flex:1}.progress div{height:100%;background:var(--g)}
.note{width:100%;min-height:100px;border:1px solid #bccac1;border-radius:10px;padding:12px;font:inherit}
@media(max-width:700px){header h1{font-size:17px;line-height:1.35}header small{font-size:11px}main{padding:10px 10px calc(120px + env(safe-area-inset-bottom))}.stats{grid-template-columns:1fr 1fr}.stat b{font-size:22px}.qhead{align-items:flex-start;flex-direction:column}.qhead h2{font-size:22px}.question{font-size:21px;line-height:1.7}.choice{font-size:17px;padding:16px}.explanation{font-size:17px;line-height:1.85}.answerbox{font-size:20px}.actions{display:grid;grid-template-columns:1.4fr .8fr}.nav{gap:8px}.nav button{padding:13px 10px;font-size:14px}}
</style>
</head>
<body>
<header><h1>地域限定旅行業務取扱管理者 合格専用 Ver3</h1><small>令和7年度・旅行業法25問・解説付き</small></header>
<main>
<section class="card stats">
<div class="stat"><b id="num">1/25</b><span>現在の問題</span></div>
<div class="stat"><b id="correct">0</b><span>正解数</span></div>
<div class="stat"><b id="accuracy">0%</b><span>正答率</span></div>
<div class="stat"><b id="review">0</b><span>要復習</span></div>
</section>

<section class="card">
<div class="qhead"><h2 id="title">第1問</h2><span class="tag">旅行業法及びこれに基づく命令</span></div>
<div id="question" class="question"></div>
<div id="choices" class="choices"></div>
<div class="actions"><button id="check" class="primary">答え合わせ</button><button id="clear" class="secondary">選択を解除</button></div>
</section>

<section id="result" class="card result">
<div id="answerbox" class="answerbox"></div>
<div class="explanation">
<h3>解説</h3><p id="explanation"></p>
<div class="memory"><strong>覚え方</strong><br><span id="memory"></span></div>
<h3>理解度</h3>
<div class="understanding">
<button data-u="3">理解した</button><button data-u="2">少し不安</button><button data-u="1">分からない</button>
</div>
<h3>自分用メモ</h3>
<textarea id="note" class="note" placeholder="覚え方、間違えた理由、条文番号など"></textarea>
<button id="saveNote" class="secondary" style="margin-top:8px">メモを保存</button>
</div>
</section>

<section class="card nav">
<button id="prev" class="secondary">← 前の問題</button>
<div class="progress"><div id="bar"></div></div>
<button id="next" class="primary">次の問題 →</button>
</section>

<section class="card">
<h3 style="margin-top:0">iPhoneでアプリのように使う方法</h3>
<p style="line-height:1.7;margin-bottom:8px">Safariで公開URLを開き、画面下の<strong>共有ボタン（□↑）</strong> → <strong>ホーム画面に追加</strong> → <strong>追加</strong>の順に押してください。</p>
<p style="font-size:13px;color:#5f6b63;margin:0">初回に一度開けば、次回以降はホーム画面のアイコンから起動できます。</p>
</section>

</main>
<script src="questions.js"></script>
<script>
const Q=window.QUESTIONS,$=id=>document.getElementById(id);
let i=+(localStorage.getItem("v3_index")||0), selected=new Set(), checked=false;
let hist=JSON.parse(localStorage.getItem("v3_hist")||"{}");
let notes=JSON.parse(localStorage.getItem("v3_notes")||"{}");
let understanding=JSON.parse(localStorage.getItem("v3_understanding")||"{}");
function save(){localStorage.setItem("v3_hist",JSON.stringify(hist));localStorage.setItem("v3_notes",JSON.stringify(notes));localStorage.setItem("v3_understanding",JSON.stringify(understanding));localStorage.setItem("v3_index",i)}
function render(){
 const q=Q[i]; selected=new Set(); checked=false;
 $("title").textContent=`第${q.id}問`;$("num").textContent=`${i+1}/${Q.length}`;$("question").textContent=q.q;
 $("choices").innerHTML=Object.entries(q.choices).map(([k,v])=>`<button class="choice" data-k="${k}"><strong>${k}</strong><span>${v}</span></button>`).join("");
 document.querySelectorAll(".choice").forEach(b=>b.onclick=()=>{if(checked)return;const k=b.dataset.k;selected.has(k)?selected.delete(k):selected.add(k);b.classList.toggle("sel")});
 $("result").className="card result";$("note").value=notes[q.id]||"";
 document.querySelectorAll(".understanding button").forEach(b=>b.classList.toggle("active",understanding[q.id]==b.dataset.u));
 $("bar").style.width=((i+1)/Q.length*100)+"%"; updateStats(); window.scrollTo({top:0,behavior:"smooth"}); save()
}
function updateStats(){
 const vals=Object.values(hist),ok=vals.filter(x=>x).length;
 $("correct").textContent=ok;$("accuracy").textContent=vals.length?Math.round(ok/vals.length*100)+"%":"0%";
 $("review").textContent=Object.values(understanding).filter(x=>+x<3).length
}
$("check").onclick=()=>{
 if(!selected.size){alert("答えを選んでください。");return}
 checked=true; const q=Q[i],ans=[...q.answer].sort(),got=[...selected].sort(),ok=JSON.stringify(ans)==JSON.stringify(got);
 hist[q.id]=ok;
 document.querySelectorAll(".choice").forEach(b=>{const k=b.dataset.k;if(ans.includes(k))b.classList.add("correct");else if(selected.has(k))b.classList.add("wrong")});
 $("answerbox").className="answerbox "+(ok?"ok":"ng");
 $("answerbox").textContent=(ok?"正解です。":"不正解です。")+` 正解：${ans.join("・")}`;
 $("explanation").textContent=q.explanation;$("memory").textContent=q.memory;$("result").className="card result show";
 updateStats();save();setTimeout(()=>$("result").scrollIntoView({behavior:"smooth",block:"start"}),100)
};
$("clear").onclick=()=>{if(checked)return;selected.clear();document.querySelectorAll(".choice").forEach(b=>b.classList.remove("sel"))}
$("next").onclick=()=>{i=(i+1)%Q.length;render()};$("prev").onclick=()=>{i=(i-1+Q.length)%Q.length;render()}
document.querySelectorAll(".understanding button").forEach(b=>b.onclick=()=>{understanding[Q[i].id]=b.dataset.u;save();render()})
$("saveNote").onclick=()=>{notes[Q[i].id]=$("note").value;save();alert("メモを保存しました。")}
document.addEventListener("keydown",e=>{if(e.target.tagName==="TEXTAREA")return;if(["1","2","3","4"].includes(e.key)){const b=document.querySelectorAll(".choice")[+e.key-1];if(b)b.click()}else if(e.key==="Enter"){checked?$("next").click():$("check").click()}});
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}render();
</script>
</body></html>
