<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#174f3a"><link rel="manifest" href="manifest.webmanifest">
<title>地域限定旅行業務取扱管理者 Ver5.0</title>
<style>
:root{--g:#174f3a;--p:#eaf4ef;--l:#d8e1dc;--r:#b42318;--b:#175cd3}
*{box-sizing:border-box}body{margin:0;background:#f4f6f5;color:#17201b;font-family:-apple-system,BlinkMacSystemFont,"Yu Gothic","Hiragino Sans",sans-serif}
header{position:sticky;top:0;z-index:9;background:var(--g);color:#fff;padding:14px 20px}header h1{font-size:20px;margin:0}.sub{font-size:12px;opacity:.9}
main{max-width:1100px;margin:auto;padding:18px 18px 100px}.card{background:#fff;border:1px solid var(--l);border-radius:16px;padding:18px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}label{display:block;font-size:12px;font-weight:800;margin-bottom:5px}
select,button,textarea{font:inherit}select,textarea{width:100%;border:1px solid #b8c6be;border-radius:10px;padding:11px;background:#fff}
button{border:0;border-radius:11px;padding:12px 14px;font-weight:800;cursor:pointer}.primary{background:var(--g);color:#fff}.soft{background:var(--p);color:var(--g)}.danger{background:#fff0ef;color:var(--r)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.stat{background:#f7faf8;border:1px solid var(--l);border-radius:12px;padding:12px}.stat b{font-size:22px;display:block}
.toolbar{display:flex;gap:8px;flex-wrap:wrap}.hidden{display:none!important}.qmeta{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.qtitle{font-size:18px;font-weight:900}
.question{white-space:pre-wrap;font-size:22px;line-height:1.85;margin-top:18px;padding:20px;border-radius:14px;background:#fcfdfc;border:1px solid var(--l)}
.answer-area{margin-top:32px;padding-top:24px;border-top:4px solid var(--p)}.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.choice{font-size:22px;background:#fff;border:2px solid #bccbc2}.choice.sel{border-color:var(--b);background:#eef4ff}.choice.correct{border-color:#16803c;background:#eaf8ef}.choice.wrong{border-color:var(--r);background:#fff0ef}
.result{margin-top:14px;padding:15px;border-radius:12px;line-height:1.7}.ok{background:#eaf8ef;color:#126b31}.ng{background:#fff0ef;color:#9b1c1c}.detail{margin-top:10px;border:1px solid var(--l);border-radius:12px;padding:14px}.detail h3{margin:0 0 8px;font-size:15px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--l);padding:10px;z-index:8}footer .inner{max-width:1100px;margin:auto;display:flex;gap:8px}
@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}.question{font-size:19px}.choices{grid-template-columns:1fr 1fr}}
@media print{header,.setup,.toolbar,footer,.answer-area .actions{display:none!important}main{max-width:none;padding:0}.card{border:0}.question{font-size:16px}}
</style></head>
<body><header><h1>地域限定旅行業務取扱管理者 試験対策アプリ Ver5.0</h1><div class="sub">令和6・7年度／全科目118問／統合PC版</div></header>
<main>
<section class="card setup"><div class="grid">
<div><label>年度</label><select id="year"><option value="all">令和6・7年度</option><option value="6">令和6年度</option><option value="7">令和7年度</option></select></div>
<div><label>科目</label><select id="subject"><option value="all">全科目</option><option value="law">旅行業法</option><option value="terms">旅行業約款等</option><option value="practice">国内旅行実務</option></select></div>
<div><label>出題方法</label><select id="mode"><option value="order">順番</option><option value="random5">ランダム5問</option><option value="random10">ランダム10問</option><option value="wrong">間違い復習</option><option value="favorite">お気に入り</option></select></div>
<div><label>開始</label><button id="start" class="primary" style="width:100%">新しく始める</button></div></div>
<div class="toolbar" style="margin-top:12px"><button id="continue" class="soft">▶ 続きから</button><button id="resetSession" class="danger">↻ 途中位置をリセット</button><button id="csv" class="soft">CSV出力</button><button id="print" class="soft">印刷</button></div></section>
<section class="card stats"><div class="stat"><small>収録問題</small><b>118</b></div><div class="stat"><small>解答数</small><b id="answered">0</b></div><div class="stat"><small>正答率</small><b id="rate">0%</b></div><div class="stat"><small>学習時間</small><b id="time">0分</b></div><div class="stat"><small>お気に入り</small><b id="favCount">0</b></div></section>
<section id="quiz" class="card hidden"><div class="qmeta"><div><div class="qtitle" id="qtitle"></div><div id="progress"></div></div><div class="toolbar"><button id="fav" class="soft">☆ お気に入り</button><select id="understanding" style="width:auto"><option value="">理解度</option><option>もう一度</option><option>少し不安</option><option>理解した</option></select></div></div>
<div id="question" class="question"></div><div class="answer-area"><h2>回答欄</h2><p>複数選択問題は複数選べます。</p><div class="choices" id="choices"></div>
<div class="actions"><button id="check" class="primary">答え合わせ</button><button id="next" class="soft">次の問題</button><button id="home" class="soft">学習条件へ戻る</button></div>
<div id="result" class="hidden"></div><div id="details" class="hidden"><div class="detail"><h3>解説</h3><div id="explanation"></div></div><div class="detail"><h3>根拠条文・資料</h3><div id="basis"></div></div><div class="detail"><h3>覚え方</h3><div id="memory"></div></div><div class="detail"><h3>誤答理由</h3><div id="wrongReason"></div></div></div>
<div class="detail"><h3>自分用メモ</h3><textarea id="memo" rows="4"></textarea></div></div></section></main>
<footer><div class="inner"><button id="prev" class="soft">← 前の問題</button><button id="footerNext" class="primary">次の問題 →</button></div></footer>
<script src="data.js"></script><script>
const Q=window.QUESTIONS,$=id=>document.getElementById(id),CH=["ア","イ","ウ","エ"];
let hist=JSON.parse(localStorage.getItem("v5_hist")||"{}"),favs=JSON.parse(localStorage.getItem("v5_favs")||"{}"),memos=JSON.parse(localStorage.getItem("v5_memos")||"{}"),understands=JSON.parse(localStorage.getItem("v5_understands")||"{}"),saved=JSON.parse(localStorage.getItem("v5_session")||"null"),elapsed=Number(localStorage.getItem("v5_time")||0),started=Date.now(),session=[],pos=0,selected=new Set(),checked=false;
function save(){localStorage.setItem("v5_hist",JSON.stringify(hist));localStorage.setItem("v5_favs",JSON.stringify(favs));localStorage.setItem("v5_memos",JSON.stringify(memos));localStorage.setItem("v5_understands",JSON.stringify(understands));localStorage.setItem("v5_time",elapsed+Math.floor((Date.now()-started)/1000));localStorage.setItem("v5_session",JSON.stringify({ids:session.map(q=>q.id),pos,year:$("year").value,subject:$("subject").value,mode:$("mode").value}))}
setInterval(()=>{save();updateStats()},10000);window.addEventListener("beforeunload",save);
function updateStats(){let v=Object.values(hist),a=v.length,c=v.filter(x=>x.correct).length;$("answered").textContent=a;$("rate").textContent=a?Math.round(c/a*100)+"%":"0%";$("time").textContent=Math.floor((elapsed+Math.floor((Date.now()-started)/1000))/60)+"分";$("favCount").textContent=Object.keys(favs).length}
function pool(){return Q.filter(q=>($("year").value==="all"||String(q.year)===$("year").value)&&($("subject").value==="all"||q.subject===$("subject").value))}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function startNew(){let p=pool(),m=$("mode").value;if(m==="random5")p=shuffle(p).slice(0,5);else if(m==="random10")p=shuffle(p).slice(0,10);else if(m==="wrong")p=p.filter(q=>hist[q.id]&&!hist[q.id].correct);else if(m==="favorite")p=p.filter(q=>favs[q.id]);if(!p.length){alert("条件に合う問題がありません。");return}session=p;pos=0;render()}
function continueSession(){if(!saved||!saved.ids?.length){alert("保存された途中位置がありません。");return}$("year").value=saved.year||"all";$("subject").value=saved.subject||"all";$("mode").value=saved.mode||"order";session=saved.ids.map(id=>Q.find(q=>q.id===id)).filter(Boolean);pos=Math.min(saved.pos||0,session.length-1);render()}
function render(){if(!session.length)return;let q=session[pos];selected=new Set();checked=false;$("quiz").classList.remove("hidden");$("qtitle").textContent=`令和${q.year}年度　${q.subjectName}　${q.label}`;$("progress").textContent=`${pos+1} / ${session.length}`;$("question").textContent=q.text;$("choices").innerHTML="";CH.forEach(c=>{let b=document.createElement("button");b.className="choice";b.textContent=c;b.onclick=()=>{if(checked)return;selected.has(c)?selected.delete(c):selected.add(c);b.classList.toggle("sel")};$("choices").appendChild(b)});$("result").className="hidden";$("details").className="hidden";$("memo").value=memos[q.id]||"";$("understanding").value=understands[q.id]||"";$("fav").textContent=favs[q.id]?"★ お気に入り":"☆ お気に入り";window.scrollTo({top:$("quiz").offsetTop-70,behavior:"smooth"});save()}
function check(){if(!selected.size){alert("回答を選択してください。");return}let q=session[pos],a=[...selected].sort(),correct=[...q.answer].sort(),ok=JSON.stringify(a)===JSON.stringify(correct);checked=true;hist[q.id]={correct:ok,selected:a,answer:correct,at:new Date().toLocaleString()};[...$("choices").children].forEach(b=>{if(correct.includes(b.textContent))b.classList.add("correct");else if(selected.has(b.textContent))b.classList.add("wrong")});let r=$("result");r.className="result "+(ok?"ok":"ng");r.textContent=(ok?"正解です。":"不正解です。")+" 正解："+correct.join("・");$("details").className="";$("explanation").textContent=q.explanation;$("basis").textContent=q.basis;$("memory").textContent=q.memory;$("wrongReason").textContent=q.wrongReason;save();updateStats()}
function move(d){if(!session.length)return;pos=Math.max(0,Math.min(session.length-1,pos+d));render()}
$("start").onclick=startNew;$("continue").onclick=continueSession;$("check").onclick=check;$("next").onclick=()=>move(1);$("footerNext").onclick=()=>move(1);$("prev").onclick=()=>move(-1);$("home").onclick=()=>{$("quiz").classList.add("hidden");window.scrollTo({top:0,behavior:"smooth"})};
$("fav").onclick=()=>{let id=session[pos].id;favs[id]?delete favs[id]:favs[id]=true;save();render()};$("memo").oninput=()=>{if(session.length){memos[session[pos].id]=$("memo").value;save()}};$("understanding").onchange=()=>{if(session.length){understands[session[pos].id]=$("understanding").value;save()}};
$("resetSession").onclick=()=>{if(confirm("途中位置だけを消しますか？ 正誤履歴・メモ・お気に入りは残ります。")){saved=null;localStorage.removeItem("v5_session");alert("途中位置をリセットしました。")}};$("print").onclick=()=>window.print();
$("csv").onclick=()=>{let rows=[["ID","年度","科目","問題","正誤","自分の回答","正解","理解度","メモ","日時"]];Q.forEach(q=>{let h=hist[q.id]||{};rows.push([q.id,q.year,q.subjectName,q.label,h.correct===true?"正解":h.correct===false?"不正解":"",h.selected?.join("・")||"",q.answer.join("・"),understands[q.id]||"",memos[q.id]||"",h.at||""])});let csv="\ufeff"+rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(",")).join("\r\n");let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="地域限定旅行業務取扱管理者_学習履歴.csv";a.click()};
updateStats();if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script></body></html>
